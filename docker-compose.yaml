services:
  nzkoreapost-scraper:
    build:
      context: ${NZKOREAPOST_DIR}
      dockerfile: ${SERVICES_DIR}/nzkoreapost-scraper/Dockerfile
    container_name: nzkoreapost-scraper
    env_file:
      - ${NZKOREAPOST_DIR}/.env
    volumes:
      - nzkoreapost-data:/app/data
    restart: unless-stopped

  naver-stock-tracker:
    image: node:22-alpine
    container_name: naver-stock-tracker
    working_dir: /app
    volumes:
      - ${STOCK_TRACKER_DIR}:/app
    env_file:
      - ${STOCK_TRACKER_DIR}/.env
    command: node index.js
    restart: unless-stopped

  naver-stock-consensus-tracker:
    build:
      context: ${STOCK_CONSENSUS_DIR}
      dockerfile: ${SERVICES_DIR}/naver-stock-consensus-tracker/Dockerfile
    container_name: naver-stock-consensus-tracker
    env_file:
      - ${STOCK_CONSENSUS_DIR}/.env
    security_opt:
      - seccomp=unconfined
    restart: unless-stopped

volumes:
  nzkoreapost-data:
